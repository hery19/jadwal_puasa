<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadan Hub Pro - Full Edition</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#059669">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .arabic { font-family: 'Amiri', serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .card-active { border: 1px solid rgba(16, 185, 129, 0.5); box-shadow: 0 0 15px rgba(16, 185, 129, 0.1); }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="text-slate-200 min-h-screen p-4 pb-10 flex flex-col items-center">

    <header class="w-full max-w-md flex justify-between items-start mb-6 px-1">
        <div>
            <h1 id="hijri-date" class="text-2xl font-extrabold text-emerald-400 italic tracking-tight">Memuat...</h1>
            <p id="masehi-date" class="text-[10px] text-slate-500 font-bold tracking-[0.2em] uppercase mt-1"></p>
        </div>
        <div id="location-status" class="text-[9px] bg-slate-800 text-slate-400 px-3 py-1.5 rounded-full border border-slate-700 flex items-center">
            <span class="w-2 h-2 bg-red-500 rounded-full mr-2 animate-pulse" id="gps-dot"></span>
            <span id="city-name">Mencari GPS...</span>
        </div>
    </header>

    <div class="glass w-full max-w-md p-6 rounded-[2.5rem] mb-6 relative overflow-hidden">
        <div class="absolute top-0 right-0 p-4 opacity-10"><i data-lucide="book-open" class="w-16 h-16"></i></div>
        <p id="quran-arabic" class="arabic text-3xl text-right mb-4 leading-loose text-emerald-50">...</p>
        <p id="quran-indo" class="text-xs text-slate-400 italic leading-relaxed">"Memuat ayat..."</p>
        <div class="mt-4 flex justify-between items-center">
            <span id="quran-ref" class="text-[10px] bg-emerald-500/10 text-emerald-500 px-2 py-1 rounded font-bold uppercase"></span>
            <button onclick="fetchDailyVerse()" class="text-slate-500 hover:text-emerald-400"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
        </div>
    </div>

    <div class="glass w-full max-w-md py-8 rounded-[3rem] text-center mb-6 shadow-2xl border-b-2 border-emerald-500/50">
        <p class="text-[10px] text-slate-500 uppercase tracking-[0.4em] mb-1">Waktu Saat Ini</p>
        <div id="clock" class="text-6xl font-black tracking-tighter text-white">00:00:00</div>
    </div>

    <div class="w-full max-w-md grid grid-cols-1 gap-3 mb-6">
        <div id="grid-container" class="grid grid-cols-2 gap-3">
            </div>
    </div>

    <audio id="audio-azan" src="https://www.islamcan.com/common/azan/azan1.mp3"></audio>
    <audio id="audio-tahrim" src="https://files.catbox.moe/k3f4o4.mp3"></audio>

    <script>
        lucide.createIcons();
        let prayerTimes = {};

        // 1. Inisialisasi & GPS Akurasi Tinggi
        function initApp() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(res => {
                    document.getElementById('gps-dot').classList.replace('bg-red-500', 'bg-emerald-500');
                    fetchData(res.coords.latitude, res.coords.longitude);
                }, err => {
                    alert("Gagal GPS. Menggunakan lokasi default Jakarta.");
                    fetchData(-6.2088, 106.8456); // Jakarta
                }, { enableHighAccuracy: true });
            }
            fetchDailyVerse();
        }

        async function fetchData(lat, lng) {
            try {
                const res = await fetch(`https://api.aladhan.com/v1/timingsByAddress?address=${lat},${lng}&method=11`);
                const json = await res.json();
                const d = json.data;
                
                prayerTimes = d.timings;
                updateUI(d);
            } catch (e) { console.error("API Error"); }
        }

        function updateUI(d) {
            const t = d.timings;
            const h = d.date.hijri;
            
            document.getElementById('hijri-date').innerText = `${h.day} ${h.month.en} ${h.year} H`;
            document.getElementById('masehi-date').innerText = d.date.readable;
            document.getElementById('city-name').innerText = "Lokasi Terdeteksi";

            const list = [
                { name: 'Imsak', time: t.Imsak, icon: 'utensils', color: 'text-blue-400', audio: 'tahrim' },
                { name: 'Subuh', time: t.Fajr, icon: 'cloud-lightning', color: 'text-indigo-400', audio: 'azan' },
                { name: 'Dzuhur', time: t.Dhuhr, icon: 'sun', color: 'text-yellow-400', audio: 'azan' },
                { name: 'Ashar', time: t.Asr, icon: 'cloud-sun', color: 'text-orange-400', audio: 'azan' },
                { name: 'Maghrib', time: t.Maghrib, icon: 'sunset', color: 'text-rose-400', audio: 'azan' },
                { name: 'Isya', time: t.Isha, icon: 'moon', color: 'text-purple-400', audio: 'azan' }
            ];

            let html = '';
            list.forEach(item => {
                html += `
                <div class="glass p-4 rounded-[1.5rem] flex flex-col items-center justify-center border border-white/5">
                    <i data-lucide="${item.icon}" class="${item.color} w-5 h-5 mb-2"></i>
                    <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">${item.name}</p>
                    <p class="text-xl font-bold text-white">${item.time}</p>
                    <button onclick="playTest('${item.audio}')" class="mt-2 text-[8px] text-slate-600 border border-slate-700 px-2 py-0.5 rounded-full hover:bg-slate-800">🔊 TEST</button>
                </div>`;
            });
            document.getElementById('grid-container').innerHTML = html;
            lucide.createIcons();
        }

        // 2. Ayat Al-Qur'an Otomatis
        async function fetchDailyVerse() {
            const random = Math.floor(Math.random() * 6236) + 1;
            const res = await fetch(`https://api.alquran.cloud/v1/ayah/${random}/editions/quran-uthmani,id.indonesian`);
            const json = await res.json();
            document.getElementById('quran-arabic').innerText = json.data[0].text;
            document.getElementById('quran-indo').innerText = `"${json.data[1].text}"`;
            document.getElementById('quran-ref').innerText = `${json.data[0].surah.englishName} : ${json.data[0].numberInSurah}`;
        }

        // 3. Clock & Alarm Logic
        setInterval(() => {
            const now = new Date();
            const clockEl = document.getElementById('clock');
            const timeStr = now.toLocaleTimeString('id-ID', { hour12: false, hour: '2-digit', minute: '2-digit' });
            const sec = now.getSeconds();
            
            clockEl.innerText = now.toLocaleTimeString('id-ID', { hour12: false });

            // Otomatis Bunyi Saat Detik 00
            if (sec === 0 && prayerTimes) {
                if (timeStr === prayerTimes.Maghrib) playAudio('azan');
                if (timeStr === prayerTimes.Imsak) playAudio('tahrim');
                if (timeStr === prayerTimes.Fajr) playAudio('azan');
                if (timeStr === prayerTimes.Dhuhr) playAudio('azan');
                if (timeStr === prayerTimes.Asr) playAudio('azan');
                if (timeStr === prayerTimes.Isha) playAudio('azan');
            }
        }, 1000);

        function playAudio(tipe) {
            const audio = document.getElementById(tipe === 'azan' ? 'audio-azan' : 'audio-tahrim');
            audio.play().catch(() => alert("Klik Layar dulu untuk aktifkan suara!"));
        }

        function playTest(tipe) {
            playAudio(tipe);
        }

        initApp();
    </script>
</body>
</html>
