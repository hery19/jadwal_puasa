<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadan Hub Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#059669">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .arabic { font-family: 'Amiri', serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(to right, #10b981, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
        .animate-soft { animation: pulse-soft 3s infinite; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen p-4 pb-20 flex flex-col items-center">

    <div class="w-full max-w-md flex justify-between items-center mb-6 px-2">
        <div>
            <h1 id="hijri-date" class="text-xl font-bold text-emerald-400 italic">Memuat Hijriah...</h1>
            <p id="masehi-date" class="text-[10px] text-slate-500 tracking-widest uppercase"></p>
        </div>
        <div class="text-right">
            <span class="text-[10px] bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded-full border border-emerald-500/30">
                <i data-lucide="map-pin" class="inline w-3 h-3 mr-1"></i> GPS Active
            </span>
        </div>
    </div>

    <div class="glass w-full max-w-md p-6 rounded-[2rem] mb-6 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div>
        <i data-lucide="quote" class="text-slate-700 absolute right-6 top-6 w-12 h-12"></i>
        <p id="quran-arabic" class="arabic text-3xl text-right mb-4 leading-relaxed text-emerald-50 text-wrap">...</p>
        <p id="quran-indo" class="text-sm text-slate-400 italic leading-snug">"Memuat ayat suci..."</p>
        <p id="quran-ref" class="text-[10px] text-emerald-500 font-bold mt-4 tracking-widest uppercase"></p>
    </div>

    <div class="glass w-full max-w-md p-8 rounded-[2.5rem] text-center mb-6 border-b-4 border-emerald-500 shadow-emerald-500/10 shadow-2xl">
        <p class="text-xs text-slate-500 uppercase tracking-[0.3em] mb-2">Waktu Saat Ini</p>
        <div id="clock" class="text-6xl font-black tracking-tighter text-white mb-2">00:00:00</div>
        <div id="countdown-label" class="text-emerald-500 font-bold text-xs animate-soft italic">Menghitung waktu shalat...</div>
    </div>

    <div class="grid grid-cols-2 gap-4 w-full max-w-md">
        <div class="glass p-5 rounded-[2rem] relative overflow-hidden group">
            <div class="flex justify-between items-start mb-4">
                <div class="bg-blue-500/20 p-2 rounded-xl"><i data-lucide="utensils" class="text-blue-400 w-5 h-5"></i></div>
                <button onclick="playTest('tahrim')" class="text-[10px] text-slate-500 hover:text-white transition">TEST</button>
            </div>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Imsak (Sahur)</p>
            <p id="waktu-sahur" class="text-3xl font-bold text-white">--:--</p>
        </div>

        <div class="glass p-5 rounded-[2rem] relative overflow-hidden">
            <div class="flex justify-between items-start mb-4">
                <div class="bg-orange-500/20 p-2 rounded-xl"><i data-lucide="sunset" class="text-orange-400 w-5 h-5"></i></div>
                <button onclick="playTest('azan')" class="text-[10px] text-slate-500 hover:text-white transition">TEST</button>
            </div>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Maghrib (Buka)</p>
            <p id="waktu-buka" class="text-3xl font-bold text-white">--:--</p>
        </div>
    </div>

    <audio id="audio-azan" src="https://www.islamcan.com/common/azan/azan1.mp3"></audio>
    <audio id="audio-tahrim" src="https://files.catbox.moe/k3f4o4.mp3"></audio>

    <script>
        lucide.createIcons();
        let jadwalSahur = ""; let jadwalBuka = "";

        // 1. Inisialisasi Aplikasi & GPS
        function initApp() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(fetchDataByCoords, () => fetchDataByCity("Jakarta"));
            } else {
                fetchDataByCity("Jakarta");
            }
            fetchDailyVerse();
        }

        // 2. Ambil Data Jadwal Salat
        async function fetchDataByCoords(pos) {
            const { latitude, longitude } = pos.coords;
            const res = await fetch(`https://api.aladhan.com/v1/timingsByAddress?address=${latitude},${longitude}&method=11`);
            const json = await res.json();
            updateUI(json.data);
        }

        async function fetchDataByCity(city) {
            const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=Indonesia&method=11`);
            const json = await res.json();
            updateUI(json.data);
        }

        function updateUI(d) {
            const t = d.timings;
            const h = d.date.hijri;
            document.getElementById('hijri-date').innerText = `${h.day} ${h.month.en} ${h.year} H`;
            document.getElementById('masehi-date').innerText = d.date.readable;
            document.getElementById('waktu-sahur').innerText = t.Imsak;
            document.getElementById('waktu-buka').innerText = t.Maghrib;
            jadwalSahur = t.Imsak;
            jadwalBuka = t.Maghrib;
        }

        // 3. Ambil Ayat Quran Acak
        async function fetchDailyVerse() {
            try {
                const randomAyat = Math.floor(Math.random() * 6236) + 1;
                const res = await fetch(`https://api.alquran.cloud/v1/ayah/${randomAyat}/editions/quran-uthmani,id.indonesian`);
                const json = await res.json();
                document.getElementById('quran-arabic').innerText = json.data[0].text;
                document.getElementById('quran-indo').innerText = `"${json.data[1].text}"`;
                document.getElementById('quran-ref').innerText = `${json.data[0].surah.englishName} : ${json.data[0].numberInSurah}`;
            } catch (e) { console.log("Ayat error"); }
        }

        // 4. Clock & Auto-Alarm Logic
        setInterval(() => {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('id-ID', { hour12: false, hour: '2-digit', minute: '2-digit' });
            const sec = now.getSeconds();
            
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', { hour12: false });

            // Cek Waktu Azan/Tahrim
            if (sec === 0) {
                if (timeStr === jadwalBuka) playAudio('azan');
                if (timeStr === jadwalSahur) playAudio('tahrim');
            }
        }, 1000);

        function playAudio(tipe) {
            const audio = document.getElementById(tipe === 'azan' ? 'audio-azan' : 'audio-tahrim');
            audio.play().catch(() => console.log("User must interact first"));
        }

        function playTest(tipe) {
            playAudio(tipe);
            alert("Memutar suara " + tipe);
        }

        initApp();
    </script>
</body>
</html>
